name: Sync Upstream
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.PAT_SYNC }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/pglombardo/PasswordPusher.git

      - name: Get latest tag before sync
        id: before_sync
        run: echo "latest_tag=$(git tag -l --sort=-v:refname 'v[0-9]*' | head -1)" >> $GITHUB_OUTPUT

      - name: Fetch upstream
        run: git fetch upstream --tags --force

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase master onto upstream/master
        run: |
          git rebase upstream/master || (git rebase --abort && echo "Rebase failed due to conflicts. Manual intervention required." && exit 1)

      - name: Push rebased master
        run: git push --force-with-lease origin master

      - name: Push tags
        run: git push origin --tags --force

      - name: Check for new tags
        id: tag_check
        run: |
          LATEST=$(git tag -l --sort=-v:refname 'v[0-9]*' | head -1)
          if [ "$LATEST" != "${{ steps.before_sync.outputs.latest_tag }}" ]; then
            echo "new_tags=true" >> $GITHUB_OUTPUT
            echo "New tag detected: $LATEST (was ${{ steps.before_sync.outputs.latest_tag }})"
          else
            echo "new_tags=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Docker ARM64 build
        if: steps.tag_check.outputs.new_tags == 'true'
        run: gh workflow run docker-containers-with-arm64.yml --repo ${{ github.repository }} --ref master --field dockerPush=true
        env:
          GH_TOKEN: ${{ secrets.PAT_SYNC }}
