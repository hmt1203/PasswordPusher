name: Sync Upstream
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.PAT_SYNC }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/pglombardo/PasswordPusher.git

      - name: Fetch upstream
        run: git fetch upstream --tags --force

      - name: Rebase master onto upstream/master
        run: |
          git rebase upstream/master || (git rebase --abort && echo "Rebase failed due to conflicts. Manual intervention required." && exit 1)

      - name: Push rebased master
        run: git push --force-with-lease origin master

      - name: Push tags
        run: git push origin --tags --force
